<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AutoApp — Android Auto</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Barlow+Condensed:wght@200;300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --nav:68px;--hdr:50px;
  --bg:#05050A;--bg2:#0C0C14;--bg3:#11111C;
  --border:#1A1A28;--border2:#222235;
  --t1:#E8EAF6;--t2:#6A6E90;--t3:#2E2E48;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Barlow Condensed',sans-serif;overflow:hidden;user-select:none}

/* ── HEADER ─────────────────────────────────────────────── */
header{
  position:fixed;top:0;left:0;right:0;height:var(--hdr);z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  background:rgba(5,5,10,.97);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.h-logo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px}
.h-logo b{color:#3D8EFF}
.h-screen{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--t2)}
.h-live{display:flex;align-items:center;gap:6px;font-size:10px;color:#3FB950;letter-spacing:1px}
.h-dot{width:6px;height:6px;border-radius:50%;background:#3FB950;box-shadow:0 0 6px #3FB950;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── PAGES ───────────────────────────────────────────────── */
.pages{position:fixed;top:var(--hdr);bottom:var(--nav);left:0;right:0;overflow:hidden}
.page{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg)}
.page.on{display:flex}

/* ── BOTTOM NAV ──────────────────────────────────────────── */
nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nav);z-index:200;
  display:grid;grid-template-columns:repeat(3,1fr);
  background:rgba(5,5,10,.97);border-top:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.nb{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  border:none;background:none;color:var(--t2);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  transition:color .2s;position:relative;
}
.nb::before{
  content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;
  border-radius:2px 2px 0 0;background:transparent;transition:all .25s;
}
.nb.on{color:#3D8EFF}.nb.on::before{background:#3D8EFF;box-shadow:0 0 8px #3D8EFF}
.nb .ni{font-size:21px;line-height:1}

/* ════════════════════════════════════════════════════════════
   SPEEDOMETER PAGE
════════════════════════════════════════════════════════════ */
/* Brand strip */
.brand-strip{
  display:flex;gap:0;overflow-x:auto;padding:7px 10px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  scrollbar-width:none;flex-shrink:0;
}
.brand-strip::-webkit-scrollbar{display:none}
.bb{
  flex-shrink:0;margin-right:5px;padding:5px 13px;border-radius:5px;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--t2);
  transition:all .2s;white-space:nowrap;
}
.bb:hover{color:var(--t1);border-color:var(--t3)}
.bb.on{color:#fff;background:var(--bc,#3D8EFF);border-color:transparent;box-shadow:0 0 12px var(--bg,rgba(61,142,255,.35))}
.digital-badge{
  font-size:8px;font-weight:700;letter-spacing:1px;padding:1px 4px;border-radius:2px;
  background:rgba(61,142,255,.25);color:#3D8EFF;margin-left:4px;vertical-align:middle;
}

/* Gauge area */
.gw{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;min-height:0;position:relative;overflow:hidden}
.gw::before{content:'';position:absolute;width:55%;padding-bottom:55%;border-radius:50%;
  background:radial-gradient(circle,var(--gg,rgba(61,142,255,.06)) 0%,transparent 70%);pointer-events:none}
#gauge{display:block;max-width:100%;max-height:100%}

/* Data strip */
.ds{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.dc{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9px 4px;border-right:1px solid var(--border)}
.dc:last-child{border-right:none}
.dv{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--t1);line-height:1}
.dl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-top:2px}

/* Controls */
.ctrl{display:flex;gap:8px;padding:9px 14px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.cb{flex:1;padding:8px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--t1);
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.cb:hover{background:var(--bg2)}.cb.on{background:rgba(61,142,255,.12);border-color:#3D8EFF;color:#3D8EFF}

/* ════════════════════════════════════════════════════════════
   RADIO PAGE
════════════════════════════════════════════════════════════ */
.np{display:flex;align-items:center;gap:14px;padding:14px 18px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.npd{width:50px;height:50px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  border:1px solid var(--border2);flex-shrink:0;position:relative}
.npd.spin{animation:spin 3s linear infinite}
.npdc{position:absolute;width:13px;height:13px;border-radius:50%;background:var(--bg)}
@keyframes spin{to{transform:rotate(360deg)}}
.npi{flex:1;min-width:0}
.npn{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.npg{font-size:11px;color:var(--t2);margin-top:2px;letter-spacing:.5px}
.npeq{display:flex;align-items:flex-end;gap:2px;height:18px;flex-shrink:0}
.eq{width:4px;border-radius:2px;background:#3D8EFF;transition:height .1s}
.eq.a{animation:eq .6s ease-in-out infinite alternate}
.eq:nth-child(2){animation-delay:.12s}.eq:nth-child(3){animation-delay:.24s}
.eq:nth-child(4){animation-delay:.08s}.eq:nth-child(5){animation-delay:.18s}
@keyframes eq{from{transform:scaleY(.2)}to{transform:scaleY(1)}}
.npstop{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);
  background:var(--bg3);color:var(--t1);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.npstop:hover{border-color:#3D8EFF;color:#3D8EFF}
.sl{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.si{display:flex;align-items:center;gap:12px;padding:12px 18px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.si:hover{background:var(--bg2)}.si.on{background:rgba(61,142,255,.06)}
.sf{font-size:18px;flex-shrink:0;width:22px;text-align:center}
.sn{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sg{font-size:11px;color:var(--t2);margin-top:1px;letter-spacing:.4px}
.sp{font-size:10px;color:#3D8EFF;font-weight:700;opacity:0;margin-left:auto;flex-shrink:0}
.si:hover .sp,.si.on .sp{opacity:1}.si.on .sp{color:#3FB950}

/* ════════════════════════════════════════════════════════════
   GPS PAGE
════════════════════════════════════════════════════════════ */
.gps-search{
  position:relative;display:flex;gap:0;flex-shrink:0;
  padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border);
}
.gps-inp{
  flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px 0 0 8px;
  color:var(--t1);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:400;
  padding:9px 14px;outline:none;letter-spacing:.3px;
}
.gps-inp::placeholder{color:var(--t2)}
.gps-inp:focus{border-color:#3D8EFF}
.gps-sbtn{
  padding:9px 16px;background:#3D8EFF;border:none;border-radius:0 8px 8px 0;
  color:#fff;font-size:15px;cursor:pointer;transition:background .2s;
}
.gps-sbtn:hover{background:#1F70E0}
.gps-drop{
  position:absolute;top:100%;left:12px;right:12px;z-index:500;
  background:var(--bg3);border:1px solid var(--border2);border-radius:0 0 10px 10px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;max-height:220px;overflow-y:auto;
}
.gps-drop.on{display:block}
.gps-result{
  padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.gps-result:last-child{border-bottom:none}
.gps-result:hover{background:var(--bg2)}
.gr-name{font-size:13px;font-weight:600;color:var(--t1)}
.gr-addr{font-size:11px;color:var(--t2);margin-top:2px}

/* Map container */
.map-wrap{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%}

/* GPS overlay (floats over map) */
.gps-ov{
  position:absolute;bottom:0;left:0;right:0;z-index:400;
  display:flex;gap:0;
  background:rgba(5,5,10,.9);border-top:1px solid var(--border);
  backdrop-filter:blur(10px);
}
.go{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px;border-right:1px solid var(--border)}
.go:last-child{border-right:none}
.gov{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--t1);line-height:1}
.gol{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-top:3px}

/* GPS status banner */
.gps-banner{
  display:flex;align-items:center;gap:8px;
  padding:9px 16px;background:rgba(61,142,255,.07);
  border-bottom:1px solid rgba(61,142,255,.15);flex-shrink:0;font-size:12px;
  letter-spacing:.5px;
}
.gps-banner.ok{background:rgba(63,185,80,.07);border-bottom-color:rgba(63,185,80,.2)}
.gps-banner.err{background:rgba(248,81,73,.07);border-bottom-color:rgba(248,81,73,.2)}
.gps-sig{display:flex;align-items:flex-end;gap:2px;height:14px}
.gsb{width:3px;border-radius:1px}

/* ── INSTRUCTION CARD (floats top of map) ─────────────── */
.nav-instr{
  position:absolute;top:10px;left:10px;right:10px;z-index:450;
  display:none;align-items:center;gap:14px;
  background:rgba(8,8,18,.96);border:1px solid var(--border2);
  border-radius:14px;padding:14px 16px;
  backdrop-filter:blur(14px);
  box-shadow:0 4px 24px rgba(0,0,0,.6);
}
.nav-instr.on{display:flex}
.nav-arrow{
  font-size:38px;flex-shrink:0;line-height:1;
  filter:drop-shadow(0 0 8px rgba(61,142,255,.5));
}
.nav-text{flex:1;min-width:0}
.nav-dist{
  font-family:'Space Mono',monospace;font-size:22px;font-weight:700;
  color:#3D8EFF;line-height:1;
}
.nav-step{
  font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;
  color:var(--t1);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nav-road{font-size:11px;color:var(--t2);margin-top:2px;letter-spacing:.5px}

/* ── NAV CONTROLS ─────────────────────────────────────── */
.nav-controls{
  position:absolute;bottom:76px;right:12px;z-index:450;
  display:flex;flex-direction:column;gap:8px;align-items:flex-end;
}
.nav-start{
  padding:11px 20px;border-radius:30px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  background:#3FB950;color:#fff;
  box-shadow:0 4px 16px rgba(63,185,80,.4);
  transition:all .2s;display:none;align-items:center;gap:8px;
}
.nav-start.on{display:flex}
.nav-start:hover{background:#2EA040;transform:translateY(-1px)}

.nav-stop{
  padding:9px 16px;border-radius:30px;border:1px solid #F85149;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  background:rgba(248,81,73,.1);color:#F85149;
  transition:all .2s;display:none;align-items:center;gap:6px;
}
.nav-stop.on{display:flex}
.nav-stop:hover{background:rgba(248,81,73,.2)}

.nav-recalc{
  padding:7px 14px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
  background:var(--bg2);color:var(--t2);transition:all .2s;
  display:none;align-items:center;gap:5px;
}
.nav-recalc.on{display:flex}

/* ── VOICE INDICATOR ─────────────────────────────────── */
.voice-dot{
  position:absolute;top:14px;right:14px;z-index:460;
  width:10px;height:10px;border-radius:50%;
  background:#3FB950;box-shadow:0 0 8px #3FB950;
  display:none;animation:blink 1.2s infinite;
}
.voice-dot.on{display:block}

/* Leaflet overrides */
.leaflet-container{background:#0A0A12}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--t1)!important;border-color:var(--border)!important}
.leaflet-popup-content-wrapper{background:var(--bg2)!important;color:var(--t1)!important;border:1px solid var(--border)!important;box-shadow:none!important}
.leaflet-popup-tip{background:var(--bg2)!important}
</style>
</head>
<body>

<header>
  <div class="h-logo">AUTO<b>APP</b></div>
  <div class="h-screen" id="hTitle">Cuentakilómetros</div>
  <div class="h-live"><div class="h-dot"></div><span id="hTime"></span></div>
</header>

<div class="pages">

  <!-- ════ SPEEDOMETER ════════════════════════════════════ -->
  <div class="page on" id="p-speedo">
    <div class="brand-strip" id="brandStrip"></div>
    <div class="gw" id="gw"><canvas id="gauge"></canvas></div>
    <div class="ds">
      <div class="dc"><div class="dv" id="dS">0</div><div class="dl">km/h</div></div>
      <div class="dc"><div class="dv" id="dM">0</div><div class="dl">Máx</div></div>
      <div class="dc"><div class="dv" id="dD">0.00</div><div class="dl">km Trip</div></div>
      <div class="dc"><div class="dv" id="dT">00:00</div><div class="dl">Tiempo</div></div>
    </div>
    <div class="ctrl">
      <button class="cb" id="simBtn" onclick="toggleSim()">▶&nbsp; Simular</button>
      <button class="cb" onclick="resetTrip()">↺&nbsp; Reset</button>
    </div>
  </div>

  <!-- ════ RADIO ══════════════════════════════════════════ -->
  <div class="page" id="p-radio">
    <!-- Hidden audio player -->
    <audio id="radioAudio" preload="none" crossorigin="anonymous"></audio>

    <div class="np">
      <div class="npd" id="npd">📻<div class="npdc"></div></div>
      <div class="npi">
        <div class="npn" id="npn">Elige una emisora</div>
        <div class="npg" id="npg">Toca una emisora para reproducir</div>
      </div>
      <div class="npeq">
        <div class="eq" style="height:5px"></div><div class="eq" style="height:9px"></div>
        <div class="eq" style="height:14px"></div><div class="eq" style="height:7px"></div>
        <div class="eq" style="height:11px"></div>
      </div>
      <button class="npstop" onclick="stopRadio()" title="Parar">⏹</button>
    </div>

    <!-- Volume + loading bar -->
    <div style="display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0">
      <span style="font-size:13px;color:var(--t2)">🔊</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.9"
        oninput="document.getElementById('radioAudio').volume=this.value"
        style="flex:1;accent-color:#3D8EFF;height:3px;cursor:pointer">
      <span style="font-size:11px;color:var(--t2);min-width:32px;text-align:right" id="volPct">90%</span>
      <div id="radioStatus" style="font-size:11px;font-weight:600;letter-spacing:1px;padding:3px 10px;border-radius:20px;
        background:rgba(61,142,255,.1);color:var(--t2);min-width:80px;text-align:center">Parado</div>
    </div>

    <div class="sl" id="sl"></div>
  </div>

  <!-- ════ GPS ════════════════════════════════════════════ -->
  <div class="page" id="p-gps">
    <div class="gps-banner" id="gpsBanner">
      <div class="gps-sig" id="gpsSig"></div>
      <span id="gpsMsg">Iniciando GPS...</span>
    </div>
    <div class="gps-search">
      <input class="gps-inp" id="gpsInp" type="text" placeholder="🔍  Buscar destino... (calle, ciudad, lugar)" autocomplete="off">
      <button class="gps-sbtn" onclick="doSearch()">→</button>
      <div class="gps-drop" id="gpsDrop"></div>
    </div>
    <div class="map-wrap">
      <div id="map"></div>

      <!-- Instrucción actual (giro) -->
      <div class="nav-instr" id="navInstr">
        <div class="nav-arrow" id="navArrow">↑</div>
        <div class="nav-text">
          <div class="nav-dist" id="navDist">—</div>
          <div class="nav-step" id="navStep">Continuar recto</div>
          <div class="nav-road" id="navRoad"></div>
        </div>
      </div>

      <!-- Indicador de voz activa -->
      <div class="voice-dot" id="voiceDot"></div>

      <!-- Botones de control -->
      <div class="nav-controls">
        <button class="nav-start" id="navStartBtn" onclick="startNav()">
          🔊&nbsp; Iniciar Navegación
        </button>
        <button class="nav-stop" id="navStopBtn" onclick="stopNav()">
          ⏹&nbsp; Detener
        </button>
        <button class="nav-recalc" id="navRecalcBtn" onclick="calcRoute()">
          🔄 Recalcular ruta
        </button>
      </div>

      <!-- Datos en la barra inferior -->
      <div class="gps-ov">
        <div class="go"><div class="gov" id="gV">—</div><div class="gol">km/h</div></div>
        <div class="go"><div class="gov" id="gR">—</div><div class="gol">km resto</div></div>
        <div class="go"><div class="gov" id="gE">—</div><div class="gol">ETA min</div></div>
        <div class="go"><div class="gov" id="gT2">—</div><div class="gol">Distancia</div></div>
      </div>
    </div>
  </div>

</div><!-- /pages -->

<nav>
  <button class="nb on" id="nb-speedo" onclick="goPage('speedo')">
    <div class="ni">🏎️</div><span>Velocímetro</span>
  </button>
  <button class="nb" id="nb-radio" onclick="goPage('radio')">
    <div class="ni">📻</div><span>Radio</span>
  </button>
  <button class="nb" id="nb-gps" onclick="goPage('gps')">
    <div class="ni">📍</div><span>GPS</span>
  </button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
/* ══════════════════════════════════════════════════════════
   BRAND CONFIGS — 10 analógicos + 5 digitales
══════════════════════════════════════════════════════════ */
const BRANDS=[
  // ── ANALÓGICOS ──────────────────────────────────────────
  {id:'bmw',name:'BMW',type:'analog',color:'#1C69D4',glow:'rgba(28,105,212,.5)',glow2:'rgba(28,105,212,.08)',
   maxSpeed:260,bg:['#05050C','#0C0C1A'],outerRing:'chrome',
   trackBg:'#0E0E1E',zones:[{f:0,t:.7,c:'#1C69D4'},{f:.7,t:.87,c:'#E8950C'},{f:.87,t:1,c:'#C41020'}],
   needle:{c:'#E63946',g:'rgba(230,57,70,.55)',w:3.5,bk:.18},
   hub:{o:'#1A1A30',i:'#1C69D4',g:'rgba(28,105,212,.4)'},
   ctr:{bg:'#03030C',dig:'#FFF',u:'#6070A0'},
   tick:{mj:'#C0C8E0',mn:'#303050',lb:'#C0C8E0'},
   sub:'Freude am Fahren'},

  {id:'mercedes',name:'Mercedes',type:'analog',color:'#B0B0B8',glow:'rgba(176,176,184,.4)',glow2:'rgba(176,176,184,.06)',

/* ══════════════════════════════════════════════════════════
   CANVAS GAUGE ENGINE
══════════════════════════════════════════════════════════ */
const SA=135*Math.PI/180, TA=270*Math.PI/180;
function s2a(s,mx){return SA+(Math.min(s,mx)/mx)*TA}
function ap(cx,cy,r,a){return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}}
function arc(ctx,cx,cy,r,a1,a2,col,lw,cap){
  ctx.beginPath();ctx.arc(cx,cy,r,a1,a2);
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineCap=cap||'round';ctx.stroke();
}

function drawAnalog(ctx,W,B,speed){
  const cx=W/2,cy=W/2;
  const OR=W*.455,BR=W*.425,TR=W*.370,TW=W*.044;
  const NR=W*.328,HR=W*.040,CR=W*.132,LR=W*.293;

  // Outer ring
  if(B.outerRing!=='none'){
    const g=ctx.createRadialGradient(cx-OR*.3,cy-OR*.4,OR*.05,cx,cy,OR);
    if(B.outerRing==='chrome-thick'){
      g.addColorStop(0,'#707070');g.addColorStop(.3,'#B0B0B0');
      g.addColorStop(.55,'#D0D0D0');g.addColorStop(.75,'#909090');g.addColorStop(1,'#404040');
    }else if(B.outerRing==='slim'){
      g.addColorStop(0,'#282828');g.addColorStop(.5,'#404040');g.addColorStop(1,'#181818');
    }else{
      g.addColorStop(0,'#383838');g.addColorStop(.4,'#686868');g.addColorStop(.7,'#484848');g.addColorStop(1,'#242424');
    }
    ctx.beginPath();ctx.arc(cx,cy,OR,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  }

  // BG
  const bg=ctx.createRadialGradient(cx,cy-BR*.2,0,cx,cy,BR);
  bg.addColorStop(0,B.bg[1]);bg.addColorStop(1,B.bg[0]);
  ctx.beginPath();ctx.arc(cx,cy,BR,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();

  // Track bg
  arc(ctx,cx,cy,TR,SA,SA+TA,B.trackBg,TW,'round');

  // Zones
  for(const z of B.zones) arc(ctx,cx,cy,TR,SA+z.f*TA,SA+z.t*TA,z.c,TW,'round');

  // Inner accent ring
  ctx.beginPath();ctx.arc(cx,cy,BR-.5,0,Math.PI*2);
  ctx.strokeStyle=B.color+'40';ctx.lineWidth=1.5;ctx.stroke();

  // Ticks
  const tmax=B.maxSpeed/10;
  for(let i=0;i<=tmax;i++){
    const a=SA+(i/tmax)*TA, isMj=i%2===0;
    const r1=TR-TW/2-W*.005, r2=r1-(isMj?W*.052:W*.030);
    const p1=ap(cx,cy,r1,a), p2=ap(cx,cy,r2,a);
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);
    ctx.strokeStyle=isMj?B.tick.mj:B.tick.mn;
    ctx.lineWidth=isMj?2:1;ctx.lineCap='round';ctx.stroke();
  }

  // Labels
  const step=B.maxSpeed<=260?40:(B.maxSpeed<=300?50:60);
  ctx.font=`600 ${W*.036}px 'Rajdhani'`;ctx.fillStyle=B.tick.lb;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let s=0;s<=B.maxSpeed;s+=step){
    const p=ap(cx,cy,LR,SA+(s/B.maxSpeed)*TA);
    ctx.fillText(String(s),p.x,p.y);
  }

  // Needle
  const na=s2a(speed,B.maxSpeed);
  ctx.save();ctx.shadowColor=B.needle.g;ctx.shadowBlur=16;
  const tip=ap(cx,cy,NR,na), bk=ap(cx,cy,-NR*B.needle.bk,na);
  const pw=B.needle.w, pl1=ap(cx,cy,pw,na+Math.PI/2), pl2=ap(cx,cy,pw,na-Math.PI/2);
  ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(pl1.x,pl1.y);
  ctx.lineTo(bk.x,bk.y);ctx.lineTo(pl2.x,pl2.y);ctx.closePath();
  ctx.fillStyle=B.needle.c;ctx.fill();
  if(B.needle.tip){
    const t0=ap(cx,cy,NR,na),t1=ap(cx,cy,NR*.75,na);
    ctx.beginPath();ctx.moveTo(t0.x,t0.y);
    ctx.lineTo((ap(cx,cy,pw*.4,na+Math.PI/2).x*.4+t1.x*.6),(ap(cx,cy,pw*.4,na+Math.PI/2).y*.4+t1.y*.6));
    ctx.lineTo((ap(cx,cy,pw*.4,na-Math.PI/2).x*.4+t1.x*.6),(ap(cx,cy,pw*.4,na-Math.PI/2).y*.4+t1.y*.6));
    ctx.fillStyle=B.needle.tip;ctx.fill();
  }
  ctx.restore();

  // Hub
  ctx.save();ctx.shadowColor=B.hub.g;ctx.shadowBlur=10;
  const hg=ctx.createRadialGradient(cx-HR*.4,cy-HR*.4,HR*.05,cx,cy,HR);
  hg.addColorStop(0,B.hub.o+'EE');hg.addColorStop(1,B.hub.o);
  ctx.beginPath();ctx.arc(cx,cy,HR,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,HR*.52,0,Math.PI*2);ctx.fillStyle=B.hub.i;ctx.fill();
  ctx.restore();

  // Center circle
  ctx.beginPath();ctx.arc(cx,cy,CR,0,Math.PI*2);ctx.fillStyle=B.ctr.bg;ctx.fill();
  const spd=Math.round(speed), fs=spd>=100?W*.092:W*.108;
  ctx.font=`700 ${fs}px 'Rajdhani'`;ctx.fillStyle=B.ctr.dig;
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.shadowColor=B.ctr.dig;ctx.shadowBlur=5;
  ctx.fillText(String(spd),cx,cy+fs*.38);ctx.shadowBlur=0;
  ctx.font=`400 ${W*.03}px 'Barlow Condensed'`;
  ctx.fillStyle=B.ctr.u;ctx.textBaseline='top';
  ctx.fillText('km/h',cx,cy+fs*.42);

  // Brand label
  ctx.font=`700 ${W*.034}px 'Rajdhani'`;ctx.fillStyle=B.tick.lb+'88';
  ctx.textBaseline='middle';ctx.fillText(B.name.toUpperCase(),cx,cy+BR*.72);
  ctx.font=`300 ${W*.021}px 'Barlow Condensed'`;ctx.fillStyle=B.tick.mn+'CC';
  ctx.fillText(B.sub,cx,cy+BR*.72+W*.035);
}

/* ── DIGITAL: TESLA ─────────────────────────────────────── */
function drawTesla(ctx,W,B,speed){
  const cx=W/2,cy=W/2;
  ctx.fillStyle=B.bg[0];ctx.fillRect(0,0,W,W);

  const spd=Math.round(speed);
  const fr=speed/B.maxSpeed;
  const col=fr>B.accel[1]?B.accelC[2]:fr>B.accel[0]?B.accelC[1]:B.accelC[0];

  // Big speed number - slightly high
  const fs=spd>=100?W*.28:W*.33;
  ctx.font=`200 ${fs}px 'Rajdhani'`;ctx.fillStyle='#FFFFFF';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,255,255,.15)';ctx.shadowBlur=20;
  ctx.fillText(String(spd),cx,cy*.82);ctx.shadowBlur=0;

  ctx.font=`300 ${W*.05}px 'Barlow Condensed'`;
  ctx.fillStyle='#404040';ctx.letterSpacing='3px';
  ctx.fillText('km/h',cx,cy*1.06);

  // Speed bar
  const bw=W*.7,bh=3,bx=W*.15,by=cy*1.22;
  ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,bh);
  if(fr>0){ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;
    ctx.fillRect(bx,by,bw*Math.min(fr,1),bh);ctx.shadowBlur=0;}

  // Mode badge
  const mode=speed>100?'FSD ACTIVE':speed>30?'AUTOPILOT':speed>0?'DRIVE':'READY';
  const mc=speed>100?'#2255FF':speed>30?'#00A878':speed>0?'#404040':'#303030';
  ctx.font=`600 ${W*.032}px 'Barlow Condensed'`;ctx.fillStyle=mc;
  ctx.letterSpacing='2px';ctx.fillText(mode,cx,cy*1.38);

  // Battery bar (simulated 78%)
  const btx=cx-W*.2, bty=cy*1.54, btw=W*.4, bth=W*.04;
  ctx.strokeStyle='#1E1E1E';ctx.lineWidth=1;ctx.strokeRect(btx,bty,btw,bth);
  const bg2=ctx.createLinearGradient(btx,0,btx+btw,0);
  bg2.addColorStop(0,'#00A878');bg2.addColorStop(.78,'#00A878');
  bg2.addColorStop(.78,'#111');bg2.addColorStop(1,'#111');
  ctx.fillStyle=bg2;ctx.fillRect(btx+1,bty+1,btw-2,bth-2);
  ctx.font=`400 ${W*.027}px 'Space Mono'`;ctx.fillStyle='#303030';
  ctx.letterSpacing='1px';ctx.fillText('78%  ·  320 km',cx,bty+bth+W*.038);

  // Tesla wordmark
  ctx.font=`200 ${W*.04}px 'Rajdhani'`;ctx.fillStyle='#1A1A1A';
  ctx.letterSpacing='6px';ctx.fillText('TESLA',cx,W*.95);
}

/* ── DIGITAL: KIA ───────────────────────────────────────── */
function drawKia(ctx,W,B,speed){
  const cx=W/2,cy=W/2;
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,W*.5);
  grad.addColorStop(0,B.bg[1]);grad.addColorStop(1,B.bg[0]);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,W);

  const r=W*.38,spd=Math.round(speed),fr=Math.min(speed/B.maxSpeed,1);

  // Ring bg
  arc(ctx,cx,cy,r,SA,SA+TA,'#151518',W*.03,'round');
  // Ring progress
  if(fr>0){
    ctx.save();ctx.shadowColor=B.ring;ctx.shadowBlur=12;
    arc(ctx,cx,cy,r,SA,SA+fr*TA,B.ring,W*.03,'round');
    ctx.restore();
  }

  // Speed digits
  const fs=spd>=100?W*.21:W*.25;
  ctx.font=`700 ${fs}px 'Rajdhani'`;ctx.fillStyle='#FFFFFF';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,255,255,.2)';ctx.shadowBlur=10;
  ctx.fillText(String(spd),cx,cy);ctx.shadowBlur=0;

  ctx.font=`600 ${W*.042}px 'Barlow Condensed'`;
  ctx.fillStyle=B.ring;ctx.textBaseline='top';
  ctx.fillText('km/h',cx,cy+fs*.55);

  // KIA logo at top
  ctx.font=`700 ${W*.056}px 'Rajdhani'`;ctx.fillStyle='#CC0000';
  ctx.textBaseline='top';ctx.shadowColor='rgba(204,0,0,.4)';ctx.shadowBlur=12;
  ctx.fillText('KIA',cx,W*.1);ctx.shadowBlur=0;

  // Power bars at bottom
  const pb=5,pbw=W*.04,pbh=W*.008,pbgap=W*.012,pbY=W*.84;
  const pbTotalW=pb*pbw+(pb-1)*pbgap;
  const pbX=cx-pbTotalW/2;
  const activeBars=Math.round(fr*pb);
  for(let i=0;i<pb;i++){
    const x=pbX+i*(pbw+pbgap);
    ctx.fillStyle=i<activeBars?B.ring:'#1E1E1E';
    ctx.fillRect(x,pbY,pbw,pbh);
  }

  ctx.font=`300 ${W*.028}px 'Barlow Condensed'`;ctx.fillStyle='#303030';
  ctx.textBaseline='top';ctx.letterSpacing='2px';
  ctx.fillText('EV6 · SPORT MODE',cx,W*.92);
}

/* ── DIGITAL: RENAULT ───────────────────────────────────── */
function drawRenault(ctx,W,B,speed){
  const cx=W/2, cy=W*.45;
  ctx.fillStyle=B.bg[0];ctx.fillRect(0,0,W,W);

  // Subtle scan lines
  for(let y=0;y<W;y+=4){ctx.fillStyle='rgba(255,255,240,.012)';ctx.fillRect(0,y,W,1);}

  const spd=Math.round(speed), fr=Math.min(speed/B.maxSpeed,1);
  const r=W*.31;

  // Arc background
  const aStart=Math.PI+.25, aEnd=Math.PI*2-.25;
  arc(ctx,cx,cy,r,aStart,aEnd,'#1A1800',W*.022,'round');

  // Arc progress (upper semicircle)
  if(fr>0){
    ctx.save();ctx.shadowColor=B.arc;ctx.shadowBlur=14;
    arc(ctx,cx,cy,r,aStart,aStart+fr*(aEnd-aStart),B.arc,W*.028,'round');
    ctx.restore();
  }

  // Speed number
  const fs=spd>=100?W*.26:W*.30;
  ctx.font=`600 ${fs}px 'Rajdhani'`;ctx.fillStyle='#FFFFFF';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,255,255,.2)';ctx.shadowBlur=8;
  ctx.fillText(String(spd),cx,cy+W*.1);ctx.shadowBlur=0;

  ctx.font=`400 ${W*.042}px 'Barlow Condensed'`;
  ctx.fillStyle=B.arc;ctx.textBaseline='top';
  ctx.fillText('km/h',cx,cy+W*.24);

  // Lozenge (Renault emblem echo) - thin diamond lines
  const lz=W*.07;
  ctx.strokeStyle=B.arc+'50';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx,cy-W*.38);ctx.lineTo(cx+lz,cy-W*.38+lz);
  ctx.lineTo(cx,cy-W*.38+lz*2);ctx.lineTo(cx-lz,cy-W*.38+lz);ctx.closePath();ctx.stroke();

  // Mode
  ctx.font=`600 ${W*.032}px 'Barlow Condensed'`;
  ctx.fillStyle='#2A2000';ctx.textBaseline='middle';ctx.letterSpacing='1px';
  ctx.fillText(`${Math.round(speed>0?speed/B.maxSpeed*100:0)}% THROTTLE`,cx,W*.78);

  // Brand
  ctx.font=`700 ${W*.048}px 'Rajdhani'`;
  ctx.fillStyle=B.arc;ctx.shadowColor=B.arc;ctx.shadowBlur=8;
  ctx.fillText('RENAULT',cx,W*.88);ctx.shadowBlur=0;
  ctx.font=`200 ${W*.026}px 'Barlow Condensed'`;ctx.fillStyle='#2A2000';
  ctx.fillText(B.sub,cx,W*.95);
}

/* ── DIGITAL: CITROËN ───────────────────────────────────── */
function drawCitroen(ctx,W,B,speed){
  const cx=W/2,cy=W/2;
  const g=ctx.createLinearGradient(0,0,0,W);
  g.addColorStop(0,B.bg[0]);g.addColorStop(1,B.bg[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,W);

  const spd=Math.round(speed),fr=Math.min(speed/B.maxSpeed,1);
  const r=W*.34, cxL=W*.3, cxR=W*.7;

  // Double chevron echo: two offset arcs
  for(let i=0;i<2;i++){
    const ox=i?cxR:cxL, oy=cy;
    arc(ctx,ox,oy,r,SA,SA+TA,'#0C0F14',W*.028,'round');
    if(fr>0){
      ctx.save();ctx.shadowColor=B.arc;ctx.shadowBlur=10;
      arc(ctx,ox,oy,r,SA,SA+fr*TA,B.arc,W*.028,'round');
      ctx.restore();
    }
  }

  // Speed centered
  const fs=spd>=100?W*.22:W*.26;
  ctx.font=`600 ${fs}px 'Rajdhani'`;ctx.fillStyle='#FFFFFF';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,255,255,.15)';ctx.shadowBlur=8;
  ctx.fillText(String(spd),cx,cy-W*.02);ctx.shadowBlur=0;

  ctx.font=`300 ${W*.04}px 'Barlow Condensed'`;
  ctx.fillStyle=B.arc;ctx.textBaseline='top';
  ctx.fillText('km/h',cx,cy+fs*.56);

  // ⊃⊂ chevron symbol at top
  ctx.font=`400 ${W*.06}px 'Barlow Condensed'`;
  ctx.fillStyle=B.arc+'CC';ctx.textBaseline='middle';
  ctx.fillText('⊃⊂',cx,W*.13);

  // Brand
  ctx.font=`700 ${W*.04}px 'Rajdhani'`;
  ctx.fillStyle=B.arc;ctx.textBaseline='bottom';
  ctx.letterSpacing='2px';ctx.fillText('CITROËN',cx,W*.91);
  ctx.font=`200 ${W*.024}px 'Barlow Condensed'`;ctx.fillStyle='#10182A';
  ctx.fillText(B.sub,cx,W*.97);
}

/* ── DIGITAL: PEUGEOT (i-Cockpit) ──────────────────────── */
function drawPeugeot(ctx,W,B,speed){
  const cx=W/2,cy=W/2;
  const g=ctx.createRadialGradient(cx,W*.3,0,cx,cy,W*.6);
  g.addColorStop(0,B.bg[1]);g.addColorStop(1,B.bg[0]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,W);

  const spd=Math.round(speed),fr=Math.min(speed/B.maxSpeed,1);
  const r=W*.37;

  // i-Cockpit compact ring - full circle thin
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='#0A0A18';ctx.lineWidth=W*.015;ctx.stroke();

  // Progress arc
  if(fr>0){
    ctx.save();ctx.shadowColor=B.arc;ctx.shadowBlur=14;
    arc(ctx,cx,cy,r,SA,SA+fr*TA,B.arc,W*.022,'round');
    ctx.restore();
  }

  // Speed marks (12 dots on ring)
  for(let i=0;i<12;i++){
    const a=SA+(i/12)*TA, p=ap(cx,cy,r,a);
    ctx.beginPath();ctx.arc(p.x,p.y,W*.008,0,Math.PI*2);
    ctx.fillStyle=i/12<fr?B.arc:'#151520';ctx.fill();
  }

  // Speed
  const fs=spd>=100?W*.23:W*.27;
  ctx.font=`700 ${fs}px 'Rajdhani'`;ctx.fillStyle='#FFFFFF';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,255,255,.2)';ctx.shadowBlur=8;
  ctx.fillText(String(spd),cx,cy);ctx.shadowBlur=0;

  ctx.font=`400 ${W*.038}px 'Barlow Condensed'`;
  ctx.fillStyle=B.arc;ctx.textBaseline='top';
  ctx.fillText('km/h',cx,cy+fs*.55);

  // i-Cockpit badge
  ctx.font=`600 ${W*.026}px 'Barlow Condensed'`;
  ctx.fillStyle='#0A1428';ctx.textBaseline='middle';ctx.letterSpacing='1px';
  ctx.fillText('i-COCKPIT',cx,W*.16);

  // PEUGEOT
  ctx.font=`700 ${W*.042}px 'Rajdhani'`;
  ctx.fillStyle=B.arc;ctx.shadowColor=B.arc;ctx.shadowBlur=8;
  ctx.textBaseline='bottom';ctx.fillText('PEUGEOT',cx,W*.9);ctx.shadowBlur=0;
  ctx.font=`200 ${W*.023}px 'Barlow Condensed'`;ctx.fillStyle='#080812';
  ctx.fillText(B.sub,cx,W*.97);
}

/* ── DISPATCH ───────────────────────────────────────────── */
function drawGauge(canvas,B,speed){
  const dpr=window.devicePixelRatio||1;
  const S=canvas.clientWidth;
  if(canvas.width!==S*dpr){canvas.width=S*dpr;canvas.height=S*dpr;}
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,S,S);
  ctx.letterSpacing='0px';
  if(B.type==='analog')drawAnalog(ctx,S,B,speed);
  else{
    switch(B.ds){
      case'tesla':drawTesla(ctx,S,B,speed);break;
      case'kia':drawKia(ctx,S,B,speed);break;
      case'renault':drawRenault(ctx,S,B,speed);break;
      case'citroen':drawCitroen(ctx,S,B,speed);break;
      case'peugeot':drawPeugeot(ctx,S,B,speed);break;
    }
  }
}

══════════════════════════════════════════════════════════ */
const ST={brand:BRANDS[0],disp:0,target:0,sim:false,max:0,trip:0,secs:0,
          last:null,gpsSpd:null};

function fitGauge(){
  const w=document.getElementById('gw'),c=document.getElementById('gauge');
  const s=Math.min(w.clientWidth,w.clientHeight)-10;
  c.style.width=c.style.height=s+'px';
}
function redraw(){drawGauge(document.getElementById('gauge'),ST.brand,ST.disp);}

function loop(ts){
  if(!ST.last)ST.last=ts;
  const dt=(ts-ST.last)/1000;ST.last=ts;

  if(ST.sim){
    ST.target+=((Math.random()-.4)*18*dt*60);
    ST.target=Math.max(0,Math.min(ST.brand.maxSpeed*.88,ST.target));
  }else if(ST.gpsSpd!==null){
    ST.target=ST.gpsSpd;
  }else{
    ST.target*=Math.max(0,1-dt*2.5);
    if(ST.target<.5)ST.target=0;
  }

  ST.disp+=((ST.target-ST.disp)*Math.min(dt*4.5,1));
  if(Math.abs(ST.disp)<.3)ST.disp=0;

  if((ST.sim||ST.gpsSpd!==null)&&ST.disp>1){
    ST.trip+=(ST.disp/3600)*dt;
    ST.secs+=dt;
    if(ST.disp>ST.max)ST.max=ST.disp;
  }

  redraw();syncData();
  requestAnimationFrame(loop);
}

function syncData(){
  const s=Math.round(ST.disp),d=ST.trip.toFixed(2),t=fmt(ST.secs);
  document.getElementById('dS').textContent=s;
  document.getElementById('dM').textContent=Math.round(ST.max);
  document.getElementById('dD').textContent=d;
  document.getElementById('dT').textContent=t;
  document.getElementById('gV').textContent=s;
  document.getElementById('gT2').textContent=d+' km';
}
function fmt(s){
  const h=Math.floor(s/3600),m=Math.floor(s/60)%60,ss=Math.floor(s)%60;
  return h>0?`${h}:${(''+m).padStart(2,'0')}:${(''+ss).padStart(2,'0')}`:
             `${(''+m).padStart(2,'0')}:${(''+ss).padStart(2,'0')}`;
}

function toggleSim(){
  ST.sim=!ST.sim;
  const b=document.getElementById('simBtn');
  b.textContent=ST.sim?'⏸  Detener':'▶  Simular';
  b.classList.toggle('on',ST.sim);
}
function resetTrip(){
  ST.sim=false;ST.target=0;ST.max=0;ST.trip=0;ST.secs=0;
  document.getElementById('simBtn').textContent='▶  Simular';
  document.getElementById('simBtn').classList.remove('on');
  syncData();
}

let radioAudio = null;
let hlsInst    = null;
let rpIdx      = -1;

function getAudio(){
  if(!radioAudio){
    radioAudio = document.getElementById('radioAudio');
    radioAudio.volume = parseFloat(document.getElementById('volSlider').value);
    radioAudio.addEventListener('playing', ()=>setRadioStatus('▶ En directo','#3FB950'));
    radioAudio.addEventListener('waiting', ()=>setRadioStatus('⏳ Cargando…','#F9A825'));
    radioAudio.addEventListener('stalled', ()=>setRadioStatus('⏳ Cargando…','#F9A825'));
    radioAudio.addEventListener('error',   ()=>setRadioStatus('⚠️ Error','#F85149'));
    radioAudio.addEventListener('pause',   ()=>setRadioStatus('Parado','var(--t2)'));
  }
  return radioAudio;
}

function setRadioStatus(txt, col){
  const s = document.getElementById('radioStatus');
  s.textContent = txt;
  s.style.color = col;
  s.style.background = col==='var(--t2)'?'rgba(61,142,255,.1)':`${col}22`;
}

document.getElementById('volSlider').addEventListener('input', function(){
  if(radioAudio) radioAudio.volume = this.value;
  document.getElementById('volPct').textContent = Math.round(this.value*100)+'%';
});

function loadStation(url, isHls){
  const audio = getAudio();

  // Destroy previous HLS instance
  if(hlsInst){ hlsInst.destroy(); hlsInst=null; }
  audio.pause();
  audio.removeAttribute('src');
  audio.load();

  if(isHls && Hls.isSupported()){
    hlsInst = new Hls({ lowLatencyMode:true, enableWorker:true });
    hlsInst.loadSource(url);
    hlsInst.attachMedia(audio);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, ()=>{ audio.play().catch(()=>{}); });
    hlsInst.on(Hls.Events.ERROR, (_,d)=>{
      if(d.fatal) setRadioStatus('⚠️ Sin señal','#F85149');
    });
  } else if(isHls && audio.canPlayType('application/vnd.apple.mpegurl')){
    // Safari native HLS
    audio.src = url;
    audio.play().catch(()=>{});
  } else {
    // Direct MP3/AAC stream
    audio.src = url;
    audio.play().catch(e=>{
      if(e.name==='NotAllowedError') setRadioStatus('⚠️ Toca Play','#F9A825');
      else setRadioStatus('⚠️ Sin señal','#F85149');
    });
  }
  setRadioStatus('⏳ Cargando…','#F9A825');
}

  if(!window.speechSynthesis)return;

  u.lang='es-ES';u.rate=1.0;u.pitch=1.05;u.volume=1;
  // Pick Spanish voice if available
  const voices=speechSynthesis.getVoices();
  const esVoice=voices.find(v=>v.lang.startsWith('es')&&v.localService)||
                voices.find(v=>v.lang.startsWith('es'));
  if(esVoice)u.voice=esVoice;
  // Flash voice dot
  const dot=document.getElementById('voiceDot');
  dot.classList.add('on');
  u.onend=()=>dot.classList.remove('on');
  speechSynthesis.speak(u);
}

/* ── Format distance for voice ─────────────────────────── */
function fmtDistVoice(m){
  if(m>=1000)return`${(m/1000).toFixed(1).replace('.',',')} kilómetros`;
  if(m>=500) return`${Math.round(m/100)*100} metros`;
  if(m>=100) return`${Math.round(m/50)*50} metros`;
  return`${Math.round(m)} metros`;
}
function fmtDistDisplay(m){
  if(m>=1000)return`${(m/1000).toFixed(1)} km`;
  return`${Math.round(m)} m`;
}

/* ── Haversine distance (meters) ───────────────────────── */
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function startGPS(){
  setBanner('searching','Buscando señal GPS...');
  if(!navigator.geolocation){setBanner('err','GPS no disponible en este navegador');return;}
  watchId=navigator.geolocation.watchPosition(
    pos=>{
      const newPos=[pos.coords.latitude,pos.coords.longitude];
      const moved=!curPos||haversine(curPos[0],curPos[1],newPos[0],newPos[1])>2;
      curPos=newPos;
      const spd=pos.coords.speed!=null?pos.coords.speed*3.6:null;
      ST.gpsSpd=spd;

      if(!userMk){
        const icon=L.divIcon({
          html:`<div style="width:18px;height:18px;border-radius:50%;background:#3D8EFF;border:3px solid #fff;box-shadow:0 0 14px #3D8EFF"></div>`,
          iconSize:[18,18],iconAnchor:[9,9],className:''
        });
        userMk=L.marker(curPos,{icon,zIndexOffset:1000}).addTo(map);
        map.setView(curPos,16);
      }else{
        userMk.setLatLng(curPos);
      }
      const acc=Math.round(pos.coords.accuracy||0);
      setBanner('ok',`GPS activo · ±${acc}m`);
      if(destPos&&moved){updateETA();if(navActive)checkStep();}
    },
    err=>{
      const msgs={1:'Permiso denegado — actívalo en Ajustes',2:'Sin señal GPS',3:'Tiempo agotado'};
      setBanner('err',msgs[err.code]||'Error GPS');
      if(!curPos){curPos=[40.4168,-3.7038];setBanner('demo','Modo demo — Madrid');}
    },
    {enableHighAccuracy:true,maximumAge:1500,timeout:12000}
  );
}

function setBanner(type,msg){
  const b=document.getElementById('gpsBanner');
  b.className='gps-banner'+(type==='ok'?' ok':type==='err'?' err':'');
  const sig=document.getElementById('gpsSig');
  const levels=type==='ok'?4:type==='err'?1:2;
  sig.innerHTML='';
  for(let i=1;i<=4;i++){
    const d=document.createElement('div');d.className='gsb';
    d.style.cssText=`height:${i*3}px;background:${i<=levels?(type==='ok'?'#3FB950':type==='err'?'#F85149':'#3D8EFF'):'#1A1A28'}`;
    sig.appendChild(d);
  }
  document.getElementById('gpsMsg').textContent=msg;
}

/* ── Search ─────────────────────────────────────────────── */
async function doSearch(){
  const q=document.getElementById('gpsInp').value.trim();if(!q)return;
  const drop=document.getElementById('gpsDrop');
  drop.innerHTML='<div class="gps-result"><div class="gr-name">Buscando...</div></div>';
  drop.classList.add('on');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=6&accept-language=es`,
      {headers:{'User-Agent':'AutoApp/1.0'}});
    const data=await r.json();drop.innerHTML='';
    if(!data.length){drop.innerHTML='<div class="gps-result"><div class="gr-name" style="color:var(--t2)">Sin resultados</div></div>';return;}
    data.forEach(res=>{
      const d=document.createElement('div');d.className='gps-result';
      const name=res.display_name.split(',').slice(0,2).join(', ');
      const addr=res.display_name.split(',').slice(2,4).join(', ');
      d.innerHTML=`<div class="gr-name">${name}</div><div class="gr-addr">${addr}</div>`;
      d.onclick=()=>{setDest(parseFloat(res.lat),parseFloat(res.lon),name);
        document.getElementById('gpsInp').value=name;drop.classList.remove('on');};
      drop.appendChild(d);
    });
  }catch{drop.innerHTML='<div class="gps-result"><div class="gr-name" style="color:#F85149">Error de red</div></div>';}
}

async function setDest(lat,lng,name){
  if(navActive)stopNav();
  destPos=[lat,lng];
  if(destMk)map.removeLayer(destMk);
  const icon=L.divIcon({
    html:`<div style="font-size:26px;filter:drop-shadow(0 2px 8px rgba(61,142,255,.7))">📍</div>`,
    iconSize:[26,26],iconAnchor:[13,26],className:''
  });
  destMk=L.marker([lat,lng],{icon}).addTo(map).bindPopup(`<b>${name}</b>`).openPopup();
  if(curPos)await calcRoute();
  else map.setView([lat,lng],14);
}

/* ── Route calculation with steps ──────────────────────── */
async function calcRoute(){
  if(!curPos||!destPos)return;
  document.getElementById('gR').textContent='…';
  document.getElementById('gE').textContent='…';
  try{
    const url=`https://router.project-osrm.org/route/v1/driving/${curPos[1]},${curPos[0]};${destPos[1]},${destPos[0]}?overview=full&geometries=geojson&steps=true`;
    const r=await fetch(url);const data=await r.json();
    if(data.code==='Ok'&&data.routes[0]){
      const route=data.routes[0];
      routeDist=route.distance/1000;
      const dur=Math.round(route.duration/60);
      document.getElementById('gR').textContent=routeDist.toFixed(1);
      document.getElementById('gE').textContent=dur;

      // Draw route
      if(routeL)map.removeLayer(routeL);
      const ll=route.geometry.coordinates.map(c=>[c[1],c[0]]);
      routeL=L.polyline(ll,{color:'#3D8EFF',weight:5,opacity:.88}).addTo(map);
      map.fitBounds(routeL.getBounds(),{padding:[40,40]});

      // Extract steps from all legs
      routeSteps=[];
      route.legs.forEach(leg=>{
        leg.steps.forEach(step=>{
          const m=step.maneuver;
          const info=getManeuvInfo(m.type,m.modifier);
          routeSteps.push({
            lat:m.location[1], lng:m.location[0],
            dist:step.distance,    // meters to NEXT step
            type:m.type, modifier:m.modifier||'straight',
            road:step.name||'',
            text:info.t, arrow:info.a,
          });
        });
      });
      currentStep=0;lastSpokenDist=-1;lastSpokenStep=-1;

      // Show start button
      document.getElementById('navStartBtn').classList.add('on');
      document.getElementById('navRecalcBtn').classList.remove('on');

      // Preview first instruction
      if(routeSteps.length>0)showInstruction(routeSteps[0],null,false);
    }
  }catch(e){document.getElementById('gR').textContent='—';console.error(e);}
}

/* ── Show instruction card ──────────────────────────────── */
function showInstruction(step,distM,withVoice){
  const card=document.getElementById('navInstr');
  card.classList.add('on');
  document.getElementById('navArrow').textContent=step.arrow;
  document.getElementById('navStep').textContent=step.text;
  document.getElementById('navRoad').textContent=step.road?`por ${step.road}`:'';
  document.getElementById('navDist').textContent=distM!=null?fmtDistDisplay(distM):'';
  if(withVoice&&distM!=null){
    const txt=`En ${fmtDistVoice(distM)}, ${step.text}${step.road?' por '+step.road:''}`;
    speak(txt,true);
  }
}

/* ── Check current step (called on GPS update) ──────────── */
function checkStep(){
  if(!routeSteps.length||!curPos)return;
  if(currentStep>=routeSteps.length)return;

  const step=routeSteps[currentStep];
  const distToStep=haversine(curPos[0],curPos[1],step.lat,step.lng);

  // Update instruction display with distance
  showInstruction(step,distToStep,false);

  // Voice at 500m
  if(distToStep<520&&distToStep>380&&lastSpokenDist!==500&&currentStep!==lastSpokenStep){
    lastSpokenDist=500;speak(`En 500 metros, ${step.text}${step.road?' por '+step.road:''}`,true);
  }
  // Voice at 200m
  if(distToStep<220&&distToStep>100&&lastSpokenDist!==200&&currentStep!==lastSpokenStep){
    lastSpokenDist=200;speak(`En 200 metros, ${step.text}`,true);
  }
  // Execute maneuver — within 30m → advance step
  if(distToStep<35&&currentStep!==lastSpokenStep){
    lastSpokenStep=currentStep;lastSpokenDist=-1;
    speak(step.text,true);
    currentStep++;
    if(currentStep>=routeSteps.length){
      // Arrived
      document.getElementById('navInstr').classList.remove('on');
      speak('Ha llegado a su destino',true);
      stopNav();return;
    }
    showInstruction(routeSteps[currentStep],null,false);
  }
}

/* ── Start navigation ───────────────────────────────────── */
function startNav(){
  if(!routeSteps.length){speak('Primero busca un destino',true);return;}
  navActive=true;currentStep=0;lastSpokenDist=-1;lastSpokenStep=-1;
  document.getElementById('navStartBtn').classList.remove('on');
  document.getElementById('navStopBtn').classList.add('on');
  document.getElementById('navRecalcBtn').classList.add('on');
  document.getElementById('navInstr').classList.add('on');
  // Show first step
  if(routeSteps.length)showInstruction(routeSteps[0],null,false);
  speak('Iniciando navegación. '+routeSteps[0].text,true);
  // Center on user
  if(curPos)map.setView(curPos,17);
}

/* ── Stop navigation ────────────────────────────────────── */
function stopNav(){
  navActive=false;
  document.getElementById('navStartBtn').classList.remove('on');
  document.getElementById('navStopBtn').classList.remove('on');
  document.getElementById('navRecalcBtn').classList.remove('on');
  document.getElementById('navInstr').classList.remove('on');
  document.getElementById('voiceDot').classList.remove('on');
  speechSynthesis&&speechSynthesis.cancel();
}

/* ── ETA update ─────────────────────────────────────────── */
function updateETA(){
  if(!routeDist)return;
  const remaining=Math.max(0,routeDist-ST.trip);
  document.getElementById('gR').textContent=remaining.toFixed(1);
  document.getElementById('gT2').textContent=ST.trip.toFixed(2)+' km';
  if(ST.disp>2){
    const eta=Math.round((remaining/ST.disp)*60);
    document.getElementById('gE').textContent=eta;
  }
}

// Close dropdown on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.gps-search'))document.getElementById('gpsDrop').classList.remove('on');
});
document.getElementById('gpsInp').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

══════════════════════════════════════════════════════════ */
const PTITLES={speedo:'Cuentakilómetros',radio:'Radio',gps:'GPS en Vivo'};
function goPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  document.getElementById('nb-'+id).classList.add('on');
  document.getElementById('hTitle').textContent=PTITLES[id];
  if(id==='speedo'){fitGauge();redraw();}
  if(id==='gps'){setTimeout(()=>{initMap();map&&map.invalidateSize();},50);}
}

/* ── CLOCK ─────────────────────────────────────────────── */
function clock(){
  const n=new Date();
  document.getElementById('hTime').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

/* ── INIT ───────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded',()=>{
  buildBrands();buildRadio();fitGauge();
  document.getElementById('gw').style.setProperty('--gg',ST.brand.glow2);
  clock();setInterval(clock,1000);
  requestAnimationFrame(loop);
});
window.addEventListener('resize',()=>{fitGauge();redraw();if(map)map.invalidateSize();});
</script>
